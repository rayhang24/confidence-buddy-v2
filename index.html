<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সাহসী বন্ধু — Confidence Buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Baloo+Da+2:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #FDF8F0;
    --panel: #FFFFFF;
    --green: #6FBF73;
    --green-deep: #4E9C53;
    --orange: #FFB84D;
    --blue: #5B9BD5;
    --gold: #FFD966;
    --ink: #3A3A3A;
    --ink-soft: #6b6b6b;
    --line: #EDE6D8;
    --radius: 22px;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--cream);
    font-family: 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
    color: var(--ink);
    display:flex;
    justify-content:center;
  }

  .app{
    width:100%;
    max-width:520px;
    min-height:100vh;
    background: var(--panel);
    display:flex;
    flex-direction:column;
    box-shadow: 0 0 40px rgba(0,0,0,0.05);
  }

  /* ---------- Header ---------- */
  header{
    padding:20px 20px 16px;
    background: linear-gradient(135deg, var(--green) 0%, var(--green-deep) 100%);
    color:white;
    border-radius: 0 0 28px 28px;
  }
  .header-top{
    display:flex; align-items:center; justify-content:space-between;
  }
  .buddy-name{
    font-family:'Baloo Da 2', sans-serif;
    font-size:22px;
    font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  .star-counter{
    background: rgba(255,255,255,0.22);
    border-radius: 999px;
    padding:6px 14px;
    font-weight:600;
    font-size:15px;
    display:flex; align-items:center; gap:6px;
  }
  .progress-row{
    margin-top:14px;
  }
  .progress-track{
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    height:10px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: var(--gold);
    border-radius:999px;
    transition: width 0.6s ease;
  }
  .badge-label{
    margin-top:6px;
    font-size:13px;
    opacity:0.95;
  }

  /* ---------- Chat area ---------- */
  .chat{
    flex:1;
    padding:18px 16px 8px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .msg-row{ display:flex; gap:8px; align-items:flex-end; }
  .msg-row.user{ justify-content:flex-end; }

  .avatar{
    width:36px; height:36px; border-radius:50%;
    background: var(--orange);
    display:flex; align-items:center; justify-content:center;
    font-size:19px; flex-shrink:0;
  }

  .bubble{
    max-width:75%;
    padding:12px 16px;
    border-radius: var(--radius);
    font-size:16px;
    line-height:1.55;
  }
  .bubble.bot{
    background: #F3F7EF;
    border: 1px solid var(--line);
    border-bottom-left-radius:6px;
  }
  .bubble.user{
    background: var(--blue);
    color:white;
    border-bottom-right-radius:6px;
  }

  .typing{
    display:flex; gap:4px; padding:6px 4px;
  }
  .typing span{
    width:7px; height:7px; border-radius:50%;
    background: var(--ink-soft);
    opacity:0.5;
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:0.2s; }
  .typing span:nth-child(3){ animation-delay:0.4s; }
  @keyframes blink{ 0%,80%,100%{opacity:0.25} 40%{opacity:0.9} }

  /* ---------- Tasks ---------- */
  .tasks-section{
    padding: 4px 16px 14px;
    border-top:1px solid var(--line);
  }
  .tasks-title{
    font-size:14px;
    color: var(--ink-soft);
    margin:12px 0 8px;
    font-weight:600;
  }
  .tasks-scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:4px;
  }
  .task-card{
    flex: 0 0 auto;
    min-width:150px;
    background: #FFF8EA;
    border:1px solid #F3E3B8;
    border-radius:16px;
    padding:12px 14px;
    font-size:14.5px;
    text-align:center;
    cursor:pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .task-card:hover{ transform: translateY(-2px); }
  .task-card.done{
    background: #EAF6EA;
    border-color:#BFE3BF;
    color: var(--green-deep);
    font-weight:600;
  }
  .task-emoji{ font-size:22px; display:block; margin-bottom:6px; }

  /* ---------- Input ---------- */
  .quick-replies{
    display:flex; gap:8px; padding: 0 16px 8px;
  }
  .quick-btn{
    border:1px solid var(--line);
    background:white;
    border-radius:999px;
    padding:8px 14px;
    font-size:18px;
    cursor:pointer;
  }
  .quick-btn:active{ transform: scale(0.94); }

  .input-bar{
    display:flex;
    gap:8px;
    padding:10px 16px 18px;
  }
  .input-bar input{
    flex:1;
    border:1px solid var(--line);
    border-radius:999px;
    padding:13px 18px;
    font-size:16px;
    font-family:inherit;
    outline:none;
  }
  .input-bar input:focus{ border-color: var(--blue); }
  .send-btn{
    background: var(--green);
    color:white;
    border:none;
    border-radius:999px;
    width:48px; height:48px;
    font-size:20px;
    cursor:pointer;
    flex-shrink:0;
  }
  .send-btn:active{ transform: scale(0.94); }
  .send-btn:disabled{ opacity:0.5; }

  .footnote{
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
    padding: 0 20px 14px;
  }

  ::-webkit-scrollbar{ height:6px; width:6px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:10px; }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="header-top">
      <div class="buddy-name">🌟 সাহসী বন্ধু</div>
      <div class="star-counter">⭐ <span id="starCount">0</span></div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="badge-label" id="badgeLabel">চলো শুরু করি!</div>
    </div>
  </header>

  <div class="chat" id="chatBox"></div>

  <div class="tasks-section">
    <div class="tasks-title">আজকের ছোট্ট চ্যালেঞ্জ 💪</div>
    <div class="tasks-scroll" id="tasksScroll"></div>
  </div>

  <div class="quick-replies">
    <button class="quick-btn" data-q="😊 আজকে আমার ভালো লাগছে">😊</button>
    <button class="quick-btn" data-q="😐 আজকে আমার মন খারাপ না ভালোও না">😐</button>
    <button class="quick-btn" data-q="😢 আজকে একটু মন খারাপ">😢</button>
    <button class="quick-btn" data-q="🙋 আমার সাহায্য দরকার">🙋</button>
  </div>

  <div class="input-bar">
    <input type="text" id="userInput" placeholder="তোমার মনের কথা লেখো..." />
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

  <div class="footnote">এই অ্যাপটি একজন বড়দের (শিক্ষক/অভিভাবক) তত্ত্বাবধানে ব্যবহার করা ভালো 💚</div>

</div>

<script>
const STORAGE_KEY = 'confidence-buddy-progress';
const MODEL = 'claude-sonnet-4-6';

const TASKS = [
  { id:'t1', emoji:'🪞', text:'আয়নার সামনে দাঁড়িয়ে বলো "আমি পারি!"' },
  { id:'t2', emoji:'🙏', text:'কাউকে একবার "ধন্যবাদ" বলো' },
  { id:'t3', emoji:'🎨', text:'একটা ছবি এঁকে দেখাও' },
  { id:'t4', emoji:'🌬️', text:'৩ বার জোরে নিঃশ্বাস নাও' },
  { id:'t5', emoji:'📖', text:'একটা নতুন শব্দ শিখে বলো' },
];

const BADGES = [
  { min:0,  label:'চলো শুরু করি!' },
  { min:5,  label:'🌱 ছোট্ট সাহসী বন্ধু' },
  { min:10, label:'🌟 উজ্জ্বল তারা' },
  { min:20, label:'🏆 কনফিডেন্স চ্যাম্পিয়ন' },
];

let state = {
  stars: 0,
  completedTasks: [],
  history: []
};

const chatBox = document.getElementById('chatBox');
const starCountEl = document.getElementById('starCount');
const progressFill = document.getElementById('progressFill');
const badgeLabel = document.getElementById('badgeLabel');
const tasksScroll = document.getElementById('tasksScroll');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function currentBadge(){
  let b = BADGES[0];
  for(const item of BADGES){ if(state.stars >= item.min) b = item; }
  return b;
}

function nextBadgeTarget(){
  const next = BADGES.find(b => b.min > state.stars);
  return next ? next.min : (state.stars + 5);
}

function updateHeader(){
  starCountEl.textContent = state.stars;
  const badge = currentBadge();
  badgeLabel.textContent = badge.label;
  const target = nextBadgeTarget();
  const prevTarget = [...BADGES].reverse().find(b => b.min <= state.stars)?.min || 0;
  const span = Math.max(target - prevTarget, 1);
  const pct = Math.min(100, Math.round(((state.stars - prevTarget) / span) * 100));
  progressFill.style.width = pct + '%';
}

function addMessage(role, text, save=true){
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');

  if(role !== 'user'){
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = '🌟';
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
  bubble.textContent = text;
  row.appendChild(bubble);

  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;

  if(save){
    state.history.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
    if(state.history.length > 12) state.history = state.history.slice(-12);
    saveProgress();
  }
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typingRow';
  row.innerHTML = '<div class="avatar">🌟</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;
}
function hideTyping(){
  const row = document.getElementById('typingRow');
  if(row) row.remove();
}

function renderTasks(){
  tasksScroll.innerHTML = '';
  TASKS.forEach(task => {
    const done = state.completedTasks.includes(task.id);
    const card = document.createElement('div');
    card.className = 'task-card' + (done ? ' done' : '');
    card.innerHTML = `<span class="task-emoji">${task.emoji}</span>${done ? 'দারুণ! হয়ে গেছে ✅' : task.text}`;
    if(!done){
      card.addEventListener('click', () => completeTask(task));
    }
    tasksScroll.appendChild(card);
  });
}

async function completeTask(task){
  state.completedTasks.push(task.id);
  state.stars += 1;
  updateHeader();
  renderTasks();
  saveProgress();

  addMessage('user', `আমি করেছি: ${task.text}`);
  showTyping();
  const reply = await callBuddy(`শিশুটি এই ছোট্ট কাজটি সম্পন্ন করেছে: "${task.text}". তাকে সংক্ষেপে, উষ্ণভাবে অভিনন্দন জানাও এবং তার প্রচেষ্টার প্রশংসা করো।`);
  hideTyping();
  addMessage('assistant', reply);
}

async function callBuddy(userText){
  const systemPrompt = `তুমি "সাহসী বন্ধু" — বিশেষ চাহিদাসম্পন্ন (special needs) একটি শিশুর জন্য একজন উষ্ণ, ধৈর্যশীল ও উৎসাহদাতা সঙ্গী। নিয়মাবলী:
- সবসময় বাংলায়, খুব সহজ ও ছোট বাক্যে (সর্বোচ্চ ২-৩ বাক্য) কথা বলো।
- সবসময় ইতিবাচক ভাষা ব্যবহার করো; কখনো সমালোচনা, তুলনা বা নেতিবাচক মন্তব্য করো না।
- ফলাফলের চেয়ে চেষ্টাকে বেশি প্রশংসা করো ("তুমি চেষ্টা করেছ, এটাই দারুণ!")।
- শিশু মন খারাপ বা ভয় পাওয়ার কথা বললে, প্রথমে তার অনুভূতি স্বীকার করো, তারপর আলতোভাবে আশ্বস্ত করো।
- মাঝে মাঝে একটা ছোট, সহজ পরবর্তী ধাপ বা মিনি-চ্যালেঞ্জের ইঙ্গিত দিতে পারো, কিন্তু চাপ দিও না।
- ইমোজি মাঝেমধ্যে ব্যবহার করতে পারো, তবে অতিরিক্ত নয়।
- কখনো ওষুধ, চিকিৎসা পরামর্শ বা রোগ নির্ণয় সংক্রান্ত কথা বলবে না; এমন প্রশ্ন এলে বড়দের সাথে কথা বলতে উৎসাহ দাও।`;

  try{
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: systemPrompt,
        messages: [
          ...state.history.slice(-8),
          { role: "user", content: userText }
        ]
      })
    });
    const data = await response.json();
    const text = data.content?.map(b => b.text || '').join('').trim();
    return text || 'আমি এখানে আছি, তোমার পাশে। 💚';
  }catch(err){
    console.error('Buddy error:', err);
    return 'আমি এখন একটু সমস্যায় পড়েছি, কিন্তু তুমি দারুণ করছ! একটু পরে আবার চেষ্টা করো। 💚';
  }
}

async function handleSend(text){
  if(!text || !text.trim()) return;
  addMessage('user', text.trim());
  userInput.value = '';
  sendBtn.disabled = true;
  showTyping();
  const reply = await callBuddy(text.trim());
  hideTyping();
  addMessage('assistant', reply);
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', () => handleSend(userInput.value));
userInput.addEventListener('keydown', e => { if(e.key === 'Enter') handleSend(userInput.value); });
document.querySelectorAll('.quick-btn').forEach(btn=>{
  btn.addEventListener('click', () => handleSend(btn.dataset.q));
});

async function saveProgress(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify({
      stars: state.stars,
      completedTasks: state.completedTasks,
      history: state.history
    }), false);
  }catch(err){ console.error('Save failed:', err); }
}

async function loadProgress(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      const saved = JSON.parse(result.value);
      state.stars = saved.stars || 0;
      state.completedTasks = saved.completedTasks || [];
      state.history = saved.history || [];
    }
  }catch(err){
    // no saved data yet — that's fine
  }
}

async function init(){
  await loadProgress();
  updateHeader();
  renderTasks();

  if(state.history.length > 0){
    state.history.forEach(m => addMessage(m.role === 'user' ? 'user' : 'assistant', m.content, false));
  } else {
    showTyping();
    const greeting = await callBuddy('শিশুটি প্রথমবার অ্যাপটি খুলেছে। তাকে উষ্ণভাবে স্বাগত জানাও এবং জিজ্ঞেস করো আজ তার কেমন লাগছে।');
    hideTyping();
    addMessage('assistant', greeting);
  }
}

init();
</script>

</body>
</html>
